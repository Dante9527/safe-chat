# ============================================================================
# SafeChat — Docker Compose
# ============================================================================
# Ollama 安裝在 host（brew install ollama），利用 Metal GPU 加速推論。
# 此檔只啟動 SafeChat app 容器，透過 host.docker.internal 連接 host Ollama。
#
# 啟動方式：
#   docker compose up -d
#
# 前置條件（只需做一次）：
#   brew install ollama
#   brew services start ollama
#   ollama pull llama3.1:8b
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # SafeChat: FastAPI + Vue UI
  # --------------------------------------------------------------------------
  safe-chat:
    build: .
    container_name: safe-chat
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
    env_file: .env    # 所有設定集中在 .env，說明見 .env.example
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
